# Perfil: mvn spring-boot:run -Dspring-boot.run.profiles=postgres
# ou export SPRING_PROFILES_ACTIVE=postgres
#
# Alinhado ao Postgres local (ex.: Postico): banco ufc_manager, usuário do sistema.
# Crie o banco se ainda não existir: CREATE DATABASE ufc_manager;
# Sobrescreva com variáveis de ambiente em produção (não commite senhas reais).

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ufc_manager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Luiz-Arruda}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema exclusivamente via SQL (Flyway). Hibernate: validate.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
