spring.application.name=ufc-manager-server
server.port=8080

# H2 em memória (testes / CI). Postgres: perfil "postgres" — application-postgres.properties
spring.datasource.url=jdbc:h2:mem:ufcdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Disciplina de BD: o SCHEMA vem SOMENTE do SQL em database/migrations/ (Flyway).
# O Hibernate não cria nem altera tabelas; só valida se as entidades batem com o DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
